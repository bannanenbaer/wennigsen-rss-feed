services:
  wennigsen:
    build:
      context: https://github.com/bannanenbaer/wennigsen-rss-feed/archive/refs/heads/main.tar.gz
    restart: unless-stopped
    ports:
      - "5002:5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',5000),3); s.close()"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
